<!DOCTYPE html>
<html>
<head>
  <title>Nova Memory Chat</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(-45deg, #02010a, #0b0b2a, #1a1a40, #000000);
  background-size: 400% 400%;
  animation: bgMove 10s ease infinite;
  overflow: hidden;
}

@keyframes bgMove {
0% {background-position: 0% 50%;}
50% {background-position: 100% 50%;}
100% {background-position: 0% 50%;}
}

.star {
position: fixed;
width: 2px;
height: 2px;
background: white;
border-radius: 50%;
box-shadow: 0 0 6px white;
animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
from {opacity: 0.3;}
to {opacity: 1; transform: scale(1.8);}
}

h1 {
margin-top: 20px;
text-shadow: 0 0 15px cyan;
}

#chat {
width: 80%;
max-width: 800px;
height: 400px;
overflow-y: auto;
margin-top: 10px;
padding: 15px;
border-radius: 20px;
background: rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
border: 1px solid rgba(255,255,255,0.2);
text-align: left;
}

#controls {
display: flex;
gap: 10px;
margin: 10px;
flex-wrap: wrap;
justify-content: center;
}

input {
width: 300px;
padding: 15px;
border-radius: 30px;
border: none;
outline: none;
}

button {
padding: 15px 20px;
border-radius: 30px;
border: none;
cursor: pointer;
background: #00c6ff;
color: white;
box-shadow: 0 0 10px #00c6ff;
transition: 0.2s;
}

button:hover {
transform: scale(1.05);
}
</style>
</head>

<body>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("YOUR_EMAILJS_PUBLIC_KEY");

// ===================== PASSWORD SYSTEM =====================
let username = prompt("👤 Enter Username:");

let savedPass = localStorage.getItem("nova_password");

if (!savedPass) {
  let newPass = prompt("🔐 Create your new password:");
  localStorage.setItem("nova_password", newPass);
  alert("Password saved! Now login again.");
  location.reload();
}

let loginPass = prompt("🔐 Enter Password:");

if (loginPass !== savedPass) {
  document.body.innerHTML = "<h1>❌ Wrong Password</h1>";
  throw new Error("Wrong password");
}

// ===================== UI =====================
document.body.innerHTML += `
<h1>🌌 Nova Memory Chat</h1>

<div id="chat"></div>

<div id="controls">
<input id="input" placeholder="Talk to Nova..." />
<button onclick="sendMessage()">🚀 Send</button>
<button onclick="connectGoogle()">📧 Connect Gmail</button>
</div>
`;

const chat = document.getElementById("chat");
const input = document.getElementById("input");

// ===================== STORAGE =====================
const MEMORY_KEY = "novaMemories";
const NOTES_KEY = "novaNotes";
const REMINDER_KEY = "novaReminders";
const CHAT_HISTORY_KEY = "novaChatHistory";

// ===================== PRINT =====================
function print(text, save = true) {
chat.innerHTML += "<p>" + text + "</p>";
chat.scrollTop = chat.scrollHeight;

if (save) {
let history = JSON.parse(localStorage.getItem(CHAT_HISTORY_KEY) || "[]");
history.push(text);
localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(history));
}
}

// ===================== CONTACTS =====================
const CONTACTS = {
dad: "YOUR_FATHER_EMAIL@example.com"
};

// ===================== EMAIL =====================
function sendEmailToContact(contact, message) {
let email = CONTACTS[contact.toLowerCase()];
if (!email) return print("❌ Unknown contact");

emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
to_email: email,
to_name: contact,
message: message
}).then(() => {
print("📨 Message sent to " + contact);
}).catch(() => {
print("❌ Email failed");
});
}

// ===================== NOVA AI =====================
const Nova = {
reply(input) {

let lower = input.toLowerCase();

if (lower === "new chat") {
chat.innerHTML = "";
localStorage.removeItem(CHAT_HISTORY_KEY);
setTimeout(() => print("🌌 New chat started!"), 100);
return "Chat cleared";
}

if (lower === "logout") {
location.reload();
return "";
}

if (lower === "time") return "🕒 " + new Date().toLocaleTimeString();
if (lower === "date") return "📅 " + new Date().toDateString();

if (lower.startsWith("remember ")) {
let mem = input.slice(9);
let m = JSON.parse(localStorage.getItem(MEMORY_KEY) || "[]");
m.push(mem);
localStorage.setItem(MEMORY_KEY, JSON.stringify(m));
return "🧠 Saved";
}

if (lower.startsWith("note ")) {
let n = JSON.parse(localStorage.getItem(NOTES_KEY) || "[]");
n.push(input.slice(5));
localStorage.setItem(NOTES_KEY, JSON.stringify(n));
return "📝 Saved";
}

if (lower.startsWith("alert(")) {
let msg = input.split("(")[1].split(")")[0];
let time = input.split("at")[1]?.trim();

let r = JSON.parse(localStorage.getItem(REMINDER_KEY) || "[]");
r.push({ message: msg, time: time, done: false });

localStorage.setItem(REMINDER_KEY, JSON.stringify(r));
return "⏰ Reminder set";
}

if (lower.startsWith("text ")) {
let parts = input.split(" ");
let contact = parts[1];
let msg = parts.slice(2).join(" ");
sendEmailToContact(contact, msg);
return "📨 Sending message...";
}

return "🤖 I don't understand";
}
};

// ===================== SEND =====================
function sendMessage() {
let text = input.value.trim();
if (!text) return;

print("You: " + text);
print("Nova: " + Nova.reply(text));
input.value = "";
}

input.addEventListener("keydown", e => {
if (e.key === "Enter") sendMessage();
});

// ===================== REMINDER ENGINE =====================
setInterval(() => {

let reminders = JSON.parse(localStorage.getItem(REMINDER_KEY) || "[]");

let now = new Date();
let current = now.getHours() * 60 + now.getMinutes();

reminders.forEach(r => {

if (r.done) return;

let match = r.time?.match(/(\d{1,2}):(\d{2})\s?(am|pm)/i);
if (!match) return;

let h = parseInt(match[1]);
let m = parseInt(match[2]);
let ap = match[3];

if (ap === "pm" && h !== 12) h += 12;
if (ap === "am" && h === 12) h = 0;

let target = h * 60 + m;

if (current >= target && current <= target + 1) {
alert("🔔 " + r.message);
print("🔔 Reminder: " + r.message);
r.done = true;
}

});

localStorage.setItem(REMINDER_KEY, JSON.stringify(reminders));

}, 1000);

// ===================== LOAD HISTORY =====================
let old = JSON.parse(localStorage.getItem(CHAT_HISTORY_KEY) || "[]");
old.forEach(m => print(m, false));

// ===================== GOOGLE =====================
function connectGoogle() {
google.accounts.id.initialize({
client_id: "YOUR_CLIENT_ID.apps.googleusercontent.com",
callback: () => print("✅ Google Connected")
});
google.accounts.id.prompt();
}

print("Nova: Hello " + username + " 🌌");

</script>

</body>
</html>
