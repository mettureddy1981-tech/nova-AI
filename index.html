function print(text, save = true) {

  chat.scrollTop = chat.scrollHeight;

  if (save) {
    let history =
      JSON.parse(localStorage.getItem(CHAT_HISTORY_KEY)) || [];

    history.push(text);

  }
}

function playMusic() {
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.frequency.value = 600;
  gain.gain.value = 0.2;

  osc.start();
  setTimeout(() => osc.stop(), 1200);
}

    }
  )

  .catch((error) => {

}

function sendMessage() {
  let text = input.value.trim();
  if (!text) return;

  print("You: " + text);
  print("Nova: " + Nova.reply(text));

  input.value = "";
}

input.addEventListener("keydown", e => {

});

setInterval(() => {

  let reminders =
    JSON.parse(localStorage.getItem(REMINDER_KEY)) || [];

  let now = new Date();
  let current = now.getHours() * 60 + now.getMinutes();

  reminders.forEach(r => {

    if (r.done) return;

    let match =
      r.time.match(/(\d{1,2}):(\d{2})\s?(am|pm)/);

    if (!match) return;

    let h = parseInt(match[1]);
    let m = parseInt(match[2]);
    let ampm = match[3];

    if (ampm === "pm" && h !== 12) h += 12;
    if (ampm === "am" && h === 12) h = 0;

    let target = h * 60 + m;

    if (current >= target && current <= target + 1) {

      playMusic();

      alert("🔔 Nova Reminder: " + r.message);

      sendEmailReminder(r.message, r.time);

      print("🔔 Reminder: " + r.message);

        REMINDER_KEY,
        JSON.stringify(reminders)

}, 1000);
