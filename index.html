<!DOCTYPE html>
<html>
<head>
<title>Nova AI</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(-45deg, #02010a, #0b0b2a, #1a1a40, #000000);
  background-size: 400% 400%;
  animation: bgMove 10s ease infinite;
  overflow: hidden;
}

@keyframes bgMove {
0% {background-position: 0% 50%;}
50% {background-position: 100% 50%;}
100% {background-position: 0% 50%;}
}

.star {
position: fixed;
width: 2px;
height: 2px;
background: white;
border-radius: 50%;
box-shadow: 0 0 6px white;
animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
from {opacity: 0.3;}
to {opacity: 1; transform: scale(1.8);}
}

h1 {
margin-top: 20px;
text-shadow: 0 0 15px cyan;
}

#chat {
width: 80%;
max-width: 800px;
height: 400px;
overflow-y: auto;
margin-top: 10px;
padding: 15px;
border-radius: 20px;
background: rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
}

#controls {
display: flex;
gap: 10px;
margin: 10px;
}

input {
width: 300px;
padding: 15px;
border-radius: 30px;
border: none;
outline: none;
}

button {
padding: 15px 20px;
border-radius: 30px;
border: none;
cursor: pointer;
background: #00c6ff;
color: white;
}
</style>
</head>

<body>

<h1>🌌 Nova AI</h1>

<div id="chat"></div>

<div id="controls">
<input id="input" placeholder="Talk to Nova..." />
<button onclick="sendMessage()">Send</button>
</div>

<audio id="music"></audio>
<audio id="alertSound"></audio>

<script>
/* ================= DATA ================= */
let memory = JSON.parse(localStorage.getItem("nova_memory") || "[]");
let notes = JSON.parse(localStorage.getItem("nova_notes") || "[]");

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function print(text) {
  chat.innerHTML += "<p>" + text + "</p>";
  chat.scrollTop = chat.scrollHeight;
}

/* ================= EMAIL (OPTIONAL) ================= */
function sendEmailToContact(contact, message) {
  print("Email system not configured in this demo.");
}

/* ================= NOVA ================= */
const Nova = {
reply(text) {
let lower = text.toLowerCase();

/* HELP */
if (lower === "help") {
return `
📜 Nova Commands<br><br>

💬 Messages<br>
text dad hi<br>
text son hi<br><br>

🧠 Memory<br>
remember I like pizza<br>
what do you remember<br>
forget I like pizza<br><br>

📝 Notes<br>
note Buy milk<br>
show notes<br>
find note milk<br>
delete note Buy milk<br><br>

🧮 Calculator<br>
calculate 25 + 5<br><br>

⏰ Reminders<br>
remind me Drink Water<br><br>

🎵 Music<br>
play rain<br>
play music<br><br>

🌐 Search<br>
search JavaScript<br><br>

🕒 Time<br>
time<br>
date<br><br>

🧹 System<br>
new chat<br>
logout
`;
}

/* TIME */
if (lower === "time") return new Date().toLocaleTimeString();
if (lower === "date") return new Date().toDateString();

/* MEMORY */
if (lower.startsWith("remember ")) {
let fact = text.replace("remember ", "");
memory.push(fact);
localStorage.setItem("nova_memory", JSON.stringify(memory));
return "Saved memory ✔";
}

if (lower === "what do you remember") {
return memory.length ? memory.join("<br>") : "Nothing stored.";
}

if (lower.startsWith("forget ")) {
let fact = text.replace("forget ", "");
memory = memory.filter(m => m !== fact);
localStorage.setItem("nova_memory", JSON.stringify(memory));
return "Forgot ✔";
}

/* NOTES */
if (lower.startsWith("note ")) {
let note = text.replace("note ", "");
notes.push(note);
localStorage.setItem("nova_notes", JSON.stringify(notes));
return "Note saved ✔";
}

if (lower === "show notes") return notes.join("<br>") || "No notes.";

if (lower.startsWith("find note ")) {
let key = text.replace("find note ", "");
return notes.filter(n => n.includes(key)).join("<br>") || "No match.";
}

if (lower.startsWith("delete note ")) {
let del = text.replace("delete note ", "");
notes = notes.filter(n => n !== del);
localStorage.setItem("nova_notes", JSON.stringify(notes));
return "Deleted ✔";
}

/* CALCULATOR */
if (lower.startsWith("calculate ")) {
let expr = text.replace("calculate ", "");
try {
return "Result: " + Function("return " + expr)();
} catch {
return "Invalid math";
}
}

/* REMINDER */
if (lower.startsWith("remind me ")) {
let msg = text.replace("remind me ", "");

setTimeout(() => {
print("⏰ Reminder: " + msg);

let alert = document.getElementById("alertSound");
alert.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
alert.play();

}, 5000);

return "Reminder set ✔";
}

/* MUSIC */
if (lower.startsWith("play ")) {
let song = text.replace("play ", "");
let music = document.getElementById("music");

if (song === "rain") {
music.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3";
} else if (song === "music") {
music.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3";
} else {
return "Song not found";
}

music.play();
return "Playing " + song;
}

/* SEARCH */
if (lower.startsWith("search ")) {
let q = text.replace("search ", "");
return "Searching: " + q;
}

/* SYSTEM */
if (lower === "new chat") {
chat.innerHTML = "";
return "New chat started";
}

if (lower === "logout") {
location.reload();
}

return "Type help";
}
};

/* SEND */
function sendMessage() {
let text = input.value.trim();
if (!text) return;

print("You: " + text);
print("Nova: " + Nova.reply(text));

input.value = "";
}

input.addEventListener("keydown", e => {
if (e.key === "Enter") sendMessage();
});

/* STARS */
function createStars() {
for (let i = 0; i < 60; i++) {
let star = document.createElement("div");
star.className = "star";
star.style.left = Math.random() * window.innerWidth + "px";
star.style.top = Math.random() * window.innerHeight + "px";
document.body.appendChild(star);
}
}
createStars();

print("Nova ready 🌌");
</script>

</body>
</html>
