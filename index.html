<!DOCTYPE html>
<html>
<head>
  <title>Nova Memory Chat</title>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init({
  publicKey: "k4Hne_y49nQgS9Azp"
});

// =====================
// LOGIN
// =====================

let username = prompt("👤 Enter your name:");
username = username.trim();

// Father email setup
let fatherEmail = localStorage.getItem("father_email");

if (!fatherEmail) {
  fatherEmail = prompt("📧 Enter your father's Gmail:");
  localStorage.setItem("father_email", fatherEmail);
}

alert("Welcome " + username + "! 🌌");

// =====================
// BACKGROUND
// =====================

document.body.style.margin = "0";
document.body.style.minHeight = "100vh";
document.body.style.overflow = "hidden";
document.body.style.color = "white";
document.body.style.fontFamily = "Arial";
document.body.style.textAlign = "center";
document.body.style.background =
"linear-gradient(-45deg, #02010a, #0b0b2a, #1a1a40, #000000)";
document.body.style.backgroundSize = "400% 400%";
document.body.style.animation = "bgMove 10s ease infinite";

// CSS animation + stars
let style = document.createElement("style");
style.innerHTML = `
@keyframes bgMove {
0% {background-position: 0% 50%;}
50% {background-position: 100% 50%;}
100% {background-position: 0% 50%;}
}

.star {
position: fixed;
width: 2px;
height: 2px;
background: white;
border-radius: 50%;
box-shadow: 0 0 6px white;
animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
from {opacity: 0.3;}
to {opacity: 1; transform: scale(1.8);}
}
`;
document.head.appendChild(style);

// stars
for (let i = 0; i < 100; i++) {
let star = document.createElement("div");
star.className = "star";
star.style.left = Math.random() * window.innerWidth + "px";
star.style.top = Math.random() * window.innerHeight + "px";
document.body.appendChild(star);
}

// =====================
// UI
// =====================

let chat = document.createElement("div");
chat.style.width = "80%";
chat.style.maxWidth = "800px";
chat.style.height = "350px";
chat.style.margin = "20px auto";
chat.style.overflowY = "auto";
chat.style.background = "rgba(255,255,255,0.1)";
chat.style.backdropFilter = "blur(10px)";
chat.style.borderRadius = "20px";
chat.style.padding = "15px";
chat.style.textAlign = "left";
document.body.appendChild(chat);

let input = document.createElement("input");
input.placeholder = "Talk to Nova...";
input.style.width = "60%";
input.style.padding = "15px";
input.style.borderRadius = "30px";
input.style.border = "none";
document.body.appendChild(input);

let button = document.createElement("button");
button.innerText = "Send";
button.onclick = sendMessage;
document.body.appendChild(button);

// =====================
// FUNCTIONS
// =====================

// FIXED PRINT FUNCTION
function print(text) {
  chat.innerHTML += "<p>" + text + "</p>";
  chat.scrollTop = chat.scrollHeight;
}

// MESSAGE FUNCTION
function message(sender, text) {
  chat.innerHTML += "<p><b>" + sender + ":</b> " + text + "</p>";
  chat.scrollTop = chat.scrollHeight;
}

// EMAIL TO DAD
function sendToDad(msg) {
  emailjs.send(
    "service_qki202a",
    "template_2k1pgtm",
    {
      to_email: fatherEmail,
      message: msg,
      from_name: username
    }
  );

  return "📩 Message sent to Dad!";
}

// =====================
// NOVA AI
// =====================

const Nova = {
reply(input) {

let lower = input.toLowerCase();

// HELLO
if (lower.includes("hello")) {
return "Hello " + username + " 🌌";
}

// TEXT DAD
if (lower.startsWith("text dad ")) {
let msg = input.replace("text dad ", "");
return sendToDad(msg);
}

// TIME
if (lower === "time") {
return new Date().toLocaleTimeString();
}

// DATE
if (lower === "date") {
return new Date().toDateString();
}

// SEARCH
if (lower.startsWith("search ")) {
window.open("https://www.google.com/search?q=" + input.slice(7), "_blank");
return "🌐 Searching Google...";
}

// UPDATE DAD EMAIL
if (lower.startsWith("set dad email ")) {
let newEmail = input.replace("set dad email ", "").trim();
fatherEmail = newEmail;
localStorage.setItem("father_email", newEmail);
return "📧 Dad email updated!";
}

return "Tell me more 🌌";
}
};

// =====================
// SEND MESSAGE
// =====================

function sendMessage() {
let text = input.value.trim();
if (!text) return;

message("You", text);
message("Nova", Nova.reply(text));

input.value = "";
}

input.addEventListener("keydown", e => {
if (e.key === "Enter") sendMessage();
});

// =====================
// STARTUP MESSAGES
// =====================

message("Nova", "Hello " + username + " 🌌");
message("Nova", "Dad email loaded: " + fatherEmail);

print(`
📜 <b>Nova Commands</b><br><br>

🧠 remember I like pizza<br>
🧠 what do you remember<br>
🧠 forget I like pizza<br><br>

📝 note Buy milk<br>
📝 show notes<br>
🔍 find note milk<br>
📝 delete note Buy milk<br><br>

🧮 calculate 25 + 5<br><br>

🕒 time<br>
📅 date<br><br>

⏰ alert(Drink Water) at 7:30 pm<br>
⏰ show reminders<br>
⏰ delete reminder Drink Water<br><br>

 text dad hi(sends gmail)<br><br>

🌐 search JavaScript tutorial<br><br>

🆕 new chat<br>
🔄 logout
`);

</script>

</body>
</html>
