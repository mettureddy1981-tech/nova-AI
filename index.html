<!DOCTYPE html>
<html>
<head>
<title>Nova Memory Chat</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(-45deg, #02010a, #0b0b2a, #1a1a40, #000000);
  background-size: 400% 400%;
  animation: bgMove 10s ease infinite;
  overflow: hidden;
}

@keyframes bgMove {
0% {background-position: 0% 50%;}
50% {background-position: 100% 50%;}
100% {background-position: 0% 50%;}
}

.star {
position: fixed;
width: 2px;
height: 2px;
background: white;
border-radius: 50%;
box-shadow: 0 0 6px white;
animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
from {opacity: 0.3;}
to {opacity: 1; transform: scale(1.8);}
}

h1 {
margin-top: 20px;
text-shadow: 0 0 15px cyan;
}

#chat {
width: 80%;
max-width: 800px;
height: 400px;
overflow-y: auto;
margin-top: 10px;
padding: 15px;
border-radius: 20px;
background: rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
}

#controls {
display: flex;
gap: 10px;
margin: 10px;
}

input {
width: 300px;
padding: 15px;
border-radius: 30px;
border: none;
outline: none;
}

button {
padding: 15px 20px;
border-radius: 30px;
border: none;
cursor: pointer;
background: #00c6ff;
color: white;
}
</style>
</head>

<body>

<h1>🌌 Nova Memory Chat</h1>

<button onclick="connectGoogle()">Login with Google</button>

<div id="chat"></div>

<div id="controls">
<input id="input" placeholder="Talk to Nova..." />
<button onclick="sendMessage()">Send</button>
</div>

<!-- MUSIC PLAYER -->
<audio id="music" controls></audio>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
/* ================= EMAILJS ================= */
emailjs.init("k4Hne_y49nQgS9Azp");

/* ================= CONTACTS ================= */
let CONTACTS = JSON.parse(localStorage.getItem("nova_contacts") || "{}");

if (!CONTACTS.dad) {
  let email = prompt("Enter dad email:");
  if (email) {
    CONTACTS.dad = email;
    localStorage.setItem("nova_contacts", JSON.stringify(CONTACTS));
  }
}

/* ================= CHAT ================= */
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function print(text) {
  chat.innerHTML += "<p>" + text + "</p>";
  chat.scrollTop = chat.scrollHeight;
}

/* ================= EMAIL ================= */
function sendEmailToContact(contact, message) {
  let email = CONTACTS[contact.toLowerCase()];
  if (!email) return print("Unknown contact");

  emailjs.send(
    "service_i2kw1kh",
    "template_2k1pgtm",
    {
      to_email: email,
      message: message
    }
  )
  .then(() => print("Email sent ✔"))
  .catch(() => print("Email failed ❌"));
}

/* ================= NOVA ================= */
const Nova = {
  reply(text) {
    let lower = text.toLowerCase();

    if (lower === "time") return new Date().toLocaleTimeString();
    if (lower === "date") return new Date().toDateString();

    /* EMAIL */
    if (lower.startsWith("text ")) {
      let parts = text.split(" ");
      let contact = parts[1];
      let msg = parts.slice(2).join(" ");

      sendEmailToContact(contact, msg);
      return "Sending message to " + contact + "...";
    }

    /* DAD MESSAGE FORMAT */
    if (lower.startsWith("text son ")) {
      let msg = text.replace("text son ", "");
      print("📩 Dad: " + msg);
      return "Message received from dad";
    }

    /* REMINDER */
    if (lower.startsWith("remind me ")) {
      let msg = text.replace("remind me ", "");

      setTimeout(() => {
        print("⏰ Reminder: " + msg);
      }, 5000);

      return "Reminder set (5 seconds demo)";
    }

    /* MUSIC */
    if (lower.startsWith("play ")) {
      let song = text.replace("play ", "").trim();
      let music = document.getElementById("music");

      if (song === "rain") {
        music.src = "rain.mp3"; // add your file
      } else if (song === "music") {
        music.src = "music.mp3"; // add your file
      } else {
        return "Song not found";
      }

      music.play();
      return "Playing: " + song;
    }

    if (lower === "new chat") {
      chat.innerHTML = "";
      return "New chat started";
    }

    if (lower === "logout") {
      location.reload();
    }

    return "Commands: text dad hi, remind me ..., play rain";
  }
};

/* ================= SEND ================= */
function sendMessage() {
  let text = input.value.trim();
  if (!text) return;

  print("You: " + text);
  print("Nova: " + Nova.reply(text));

  input.value = "";
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

/* ================= STARS ================= */
function createStars() {
  for (let i = 0; i < 80; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * window.innerWidth + "px";
    star.style.top = Math.random() * window.innerHeight + "px";
    document.body.appendChild(star);
  }
}
createStars();

/* ================= GOOGLE LOGIN ================= */
function connectGoogle() {
  google.accounts.id.initialize({
    client_id: "798325821911-8tvc7v3ljp13vu4heth5q0d6ksbie4gs.apps.googleusercontent.com",
    callback: () => print("Google login success")
  });

  google.accounts.id.prompt();
}

print("Nova ready 🌌");
</script>

</body>
</html>
